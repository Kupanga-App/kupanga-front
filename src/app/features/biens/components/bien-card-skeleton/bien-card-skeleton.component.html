<div class="skel-card">
  <div class="skel-mosaic">
    <div class="sk skel-main"></div>
    <div class="sk"></div>
    <div class="sk"></div>
  </div>
  <div class="skel-body">
    <div class="skel-row">
      <div class="sk" style="height:13px;width:55%;"></div>
      <div class="sk" style="height:18px;width:22%;"></div>
    </div>
    <div class="skel-sep"></div>
    <div class="skel-row" style="gap:8px;justify-content:flex-start;">
      <div class="sk" style="height:10px;width:44px;"></div>
      <div class="sk" style="height:10px;width:32px;"></div>
      <div class="sk" style="height:10px;width:32px;"></div>
      <div class="sk" style="height:10px;width:28px;margin-left:auto;"></div>
    </div>
    <div class="skel-sep"></div>
    <div class="skel-row" style="gap:5px;justify-content:flex-start;">
      <div class="sk" style="height:20px;width:64px;border-radius:5px;"></div>
      <div class="sk" style="height:20px;width:56px;border-radius:5px;"></div>
    </div>
    <div class="skel-sep"></div>
    <div class="skel-owner">
      <div class="sk sk-avatar"></div>
      <div class="sk" style="height:10px;width:90px;"></div>
      <div class="sk" style="height:18px;width:48px;border-radius:100px;margin-left:auto;"></div>
    </div>
  </div>
  <div class="skel-footer">
    <div class="sk" style="height:10px;width:100px;"></div>
    <div class="sk" style="height:30px;width:60px;border-radius:7px;"></div>
  </div>
