<div class="kp-composer">
  @if (isSelf) {
    <div class="kp-composer-warn">
      Vous ne pouvez pas vous envoyer un message.
    </div>
  } @else {
    <textarea
      class="kp-composer-textarea"
      [formControl]="control"
      [placeholder]="interlocuteurNom ? 'Écrire un message à ' + interlocuteurNom + '… (Entrée pour envoyer)' : 'Écrire un message… (Entrée pour envoyer)'"
      rows="1"
      [attr.disabled]="!wsConnected ? true : null"
      (keydown)="onKeydown($event)"
      aria-label="Composer un message"
    ></textarea>
    <button
      class="kp-send-btn"
      [disabled]="!canSend"
      (click)="send()"
      aria-label="Envoyer le message"
    >
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
      Envoyer
    </button>
  }
</div>
