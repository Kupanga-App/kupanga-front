<div class="account-settings" *ngIf="user">
  <div class="settings-header">
    <button mat-icon-button type="button" (click)="goToProfileHome()">
      <mat-icon>arrow_back</mat-icon>
    </button>
    <h2>Paramètres</h2>
  </div>
  <p>* Champs obligatoires</p>

  <form #settingsForm="ngForm">

    <mat-card>
      <mat-card-header>
        <mat-card-title>Informations de compte</mat-card-title>
      </mat-card-header>
      <mat-card-content>

        <!-- Civilité -->
        <div class="form-field-group">
          <label class="field-label">Civilité :</label>
          <mat-radio-group [(ngModel)]="civility" name="gender" class="radio-group">
            <mat-radio-button value="madame">Madame</mat-radio-button>
            <mat-radio-button value="monsieur">Monsieur</mat-radio-button>
            <mat-radio-button value="unspecified">Non spécifiée</mat-radio-button>
          </mat-radio-group>
        </div>

        <!-- Nom & Prénom -->
                <div class="kp-field">
                <label class="kp-label">Nom * <span class="kp-req">*</span></label>
                <mat-form-field class="form-field-full">
          <input matInput [(ngModel)]="user.lastName" name="lastName" required>
        </mat-form-field>
        </div>

        
        <div class="kp-field">
        <label class="kp-label">Prénom * <span class="kp-req">*</span></label>

        
        <mat-form-field class="form-field-full">
          <input matInput [(ngModel)]="user.firstName" name="firstName" required>
        </mat-form-field>
        </div>

        <!-- Date de naissance -->
                <div class="kp-field">
                <label class="kp-label">Date de naissance * <span class="kp-req">*</span></label>
                <mat-form-field class="form-field-full">
          <input matInput [matDatepicker]="birthPicker" [(ngModel)]="birthdate" name="birthdate" required>
          <mat-datepicker-toggle matIconSuffix [for]="birthPicker"></mat-datepicker-toggle>
          <mat-datepicker #birthPicker></mat-datepicker>
        </mat-form-field>
        </div>

        <!-- Adresse -->
                <div class="kp-field">
                <label class="kp-label">Adresse * <span class="kp-req">*</span></label>
                <mat-form-field class="form-field-full">
          <input matInput [(ngModel)]="address" name="address" required>
        </mat-form-field>
        </div>

        <!-- Email (lecture seule) -->
                <div class="kp-field">
                <label class="kp-label">E-mail <span class="kp-req">*</span></label>
                <mat-form-field class="form-field-full">
          <input matInput [value]="user.email" name="email" readonly disabled>
        </mat-form-field>
        </div>

      </mat-card-content>
      <mat-card-actions align="end">
        <button mat-raised-button color="primary" type="submit" [disabled]="settingsForm.invalid">
          <mat-icon>save</mat-icon>
          Enregistrer
        </button>
      </mat-card-actions>
    </mat-card>

    <mat-card class="mt-4">
      <mat-card-header>
        <mat-card-title>Apparence</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <mat-radio-group [(ngModel)]="theme" name="theme" class="radio-group">
          <mat-radio-button value="device">Thème de l'appareil</mat-radio-button>
          <mat-radio-button value="dark">Thème foncé</mat-radio-button>
          <mat-radio-button value="light">Thème clair</mat-radio-button>
        </mat-radio-group>
      </mat-card-content>
    </mat-card>

  </form>
</div>
