<div class="pw-strength">
  <div class="pw-segments">
    @for (seg of segments; track seg) {
      <span class="segment" [class.active]="seg <= strength()"></span>
    }
  </div>
  <div class="pw-meta">
    <span class="pw-label">
      Robustesse · <b>{{ labels[strength()] || '—' }}</b>
    </span>
    <span class="pw-count">{{ criteriaCount }} / 12 critères</span>
  </div>
</div>
