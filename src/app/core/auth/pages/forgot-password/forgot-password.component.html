<kp-auth-layout-c
  kicker="Service après-clé"
  hero="&lt;em&gt;Mot&lt;/em&gt; oublié ?"
  subhero="Ça arrive — y compris à celles et ceux qui collectionnent les baux. Indiquez votre email, on s'occupe du reste."
  badge="N° 0002"
  eyebrow="02 · Réinitialisation"
  title="Lien de récupération."
  sub="Un email avec un lien valable 30 minutes."
  [footer]="footerTpl"
>
  @if (isSent()) {
    <div class="sent-state">
      <div class="sent-icon">
        <lucide-icon [img]="Check" [size]="24" />
      </div>
      <h3 class="sent-title">Email envoyé.</h3>
      <p class="sent-text">
        Vérifiez votre boîte de réception. Le lien est valable 30 minutes.
      </p>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <kp-auth-field
        label="Adresse email"
        [required]="true"
        type="email"
        placeholder="vous@exemple.fr"
        hint="Le lien est valable 30 minutes."
        [control]="emailCtrl"
        fieldId="forgot-email"
      />

      <div class="info-block">
        <lucide-icon [img]="Shield" [size]="14" class="info-icon" />
        <span>Un lien de réinitialisation sécurisé sera envoyé à cette adresse.</span>
      </div>

      @if (serverError()) {
        <p class="server-error" role="alert" aria-live="polite">{{ serverError() }}</p>
      }

      <button type="submit" class="btn-primary btn-full" [disabled]="isSubmitting()">
        @if (isSubmitting()) {
          <span class="spinner"></span>
        } @else {
          Envoyer le lien
          <lucide-icon [img]="Send" [size]="16" />
        }
      </button>
    </form>
  }
</kp-auth-layout-c>

<ng-template #footerTpl>
  <a routerLink="/auth/login" class="back-link">← Retour à la connexion</a>
</ng-template>
