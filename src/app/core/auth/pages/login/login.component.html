<kp-auth-layout-c
  kicker="Le journal · Édition matinale"
  hero="Bonjour."
  subhero="Une bonne gestion locative, c'est avant tout une bonne tenue des comptes — et un peu d'attention."
  badge="N° 0001"
  eyebrow="01 · Connexion"
  title="Espace personnel."
  sub="Reprenez là où vous vous étiez arrêté."
  [rubrics]="rubrics"
  [footer]="footerTpl"
>
  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
    <kp-auth-field
      label="Adresse email"
      [required]="true"
      type="email"
      placeholder="vous@exemple.fr"
      [control]="emailCtrl"
      fieldId="login-email"
    />

    <kp-auth-field
      label="Mot de passe"
      [required]="true"
      type="password"
      placeholder="••••••••"
      [control]="passwordCtrl"
      fieldId="login-password"
    />

    <div class="login-row">
      <mat-checkbox formControlName="remember" class="remember-check">
        Se souvenir de moi
      </mat-checkbox>
      <a routerLink="/auth/forgot" class="forgot-link">Mot de passe oublié ?</a>
    </div>

    @if (serverError()) {
      <p class="server-error" role="alert" aria-live="polite">{{ serverError() }}</p>
    }

    <button type="submit" class="btn-primary btn-full" [disabled]="isSubmitting()">
      @if (isSubmitting()) {
        <span class="spinner"></span>
      } @else {
        Se connecter
        <lucide-icon [img]="ArrowRight" [size]="16" />
      }
    </button>
  </form>
</kp-auth-layout-c>

<ng-template #footerTpl>
  Pas encore de compte ?&nbsp;
  <a routerLink="/auth/signup" class="footer-link">Créer un compte</a>
</ng-template>
