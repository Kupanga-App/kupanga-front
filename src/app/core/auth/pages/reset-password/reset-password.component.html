<kp-auth-layout-c
  kicker="Service après-clé"
  hero="Nouveau·&lt;em&gt;mot&lt;/em&gt;."
  subhero="Choisissez quelque chose dont vous vous souviendrez — pas le nom du chien des voisins."
  badge="N° 0003"
  eyebrow="03 · Nouveau mot de passe"
  title="Définissez votre mot de passe."
  sub="Au moins 8 caractères, dont une majuscule et un chiffre."
  [footer]="footerTpl"
>
  @if (isSuccess()) {
    <div class="success-state">
      <div class="success-icon">
        <lucide-icon [img]="Check" [size]="24" />
      </div>
      <h3 class="success-title">Mot de passe mis à jour.</h3>
      <p class="success-text">Redirection vers la connexion dans quelques secondes…</p>
    </div>
  } @else {
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <kp-auth-field
        label="Nouveau mot de passe"
        [required]="true"
        type="password"
        placeholder="••••••••"
        [control]="passwordCtrl"
        fieldId="reset-password"
      />

      <kp-password-strength [password]="passwordValue" />

      <kp-auth-field
        label="Confirmer le mot de passe"
        [required]="true"
        type="password"
        placeholder="••••••••"
        [control]="confirmPasswordCtrl"
        fieldId="reset-confirm"
      />

      @if (serverError()) {
        <p class="server-error" role="alert" aria-live="polite">{{ serverError() }}</p>
      }

      <button type="submit" class="btn-primary btn-full" [disabled]="isSubmitting() || form.invalid">
        @if (isSubmitting()) {
          <span class="spinner"></span>
        } @else {
          Mettre à jour
          <lucide-icon [img]="Check" [size]="16" />
        }
      </button>
    </form>
  }
</kp-auth-layout-c>

<ng-template #footerTpl>
  <a routerLink="/auth/login" class="back-link">← Retour à la connexion</a>
</ng-template>
