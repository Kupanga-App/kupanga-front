<kp-auth-layout-c
  kicker="Le journal · Édition matinale"
  hero="Bienvenue."
  subhero="Une dernière étape pour personnaliser votre expérience Kupanga."
  badge="N° 0002"
  eyebrow="02 · Votre profil"
  title="Quel est votre rôle ?"
  sub="Choisissez selon votre situation pour accéder à votre espace dédié."
  [rubrics]="rubrics"
  [footer]="footerTpl"
>
  <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
    <div class="role-section">
      <p class="role-hint">Je suis un·e…</p>
      <kp-role-picker [control]="roleCtrl" />
    </div>

    @if (serverError()) {
      <p class="server-error" role="alert" aria-live="polite">{{ serverError() }}</p>
    }

    <button type="submit" class="btn-primary btn-full" [disabled]="isSubmitting()">
      @if (isSubmitting()) {
        <span class="spinner"></span>
      } @else {
        Accéder à mon espace
        <lucide-icon [img]="ArrowRight" [size]="16" />
      }
    </button>
  </form>
</kp-auth-layout-c>

<ng-template #footerTpl>
  Mauvais compte ?&nbsp;
  <a routerLink="/auth/login" class="footer-link">Se déconnecter</a>
</ng-template>
