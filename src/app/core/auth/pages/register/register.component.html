<!-- ÉTAPE 1 — Identifiants -->
@if (step() === 1) {
  <kp-auth-layout-c
    kicker="Bienvenue · Première édition"
    hero="Rejoindre·&lt;br&gt;Kup&lt;em&gt;anga&lt;/em&gt;."
    subhero="Quelques minutes pour créer votre espace, et vous gérez vos premiers biens dans la foulée."
    badge="N° 0004"
    eyebrow="04 · Inscription · 1/2"
    title="Vos identifiants."
    sub="Étape 1 sur 2 — on s'occupe du profil ensuite."
    [footer]="footerStep1"
  >
    <form [formGroup]="form" novalidate>
      <kp-steps [current]="1" [total]="2" [labels]="['Identifiants', 'Profil']" />

      <kp-auth-field
        label="Adresse email"
        [required]="true"
        type="email"
        placeholder="vous@exemple.fr"
        [control]="emailCtrl"
        fieldId="signup-email"
      />

      <kp-auth-field
        label="Mot de passe"
        [required]="true"
        type="password"
        placeholder="••••••••"
        hint="Min. 8 caractères, une majuscule, un chiffre."
        [control]="passwordCtrl"
        fieldId="signup-password"
      />

      <kp-password-strength [password]="passwordValue" />

      <kp-auth-field
        label="Confirmer le mot de passe"
        [required]="true"
        type="password"
        placeholder="••••••••"
        [control]="confirmPasswordCtrl"
        fieldId="signup-confirm"
      />

      <button type="button" class="btn-primary btn-full" (click)="nextStep()">
        Continuer
        <lucide-icon [img]="ArrowRight" [size]="16" />
      </button>
    </form>
  </kp-auth-layout-c>
}

<!-- ÉTAPE 2 — Profil -->
@if (step() === 2) {
  <kp-auth-layout-c
    kicker="Bienvenue · Première édition"
    hero="Votre·&lt;em&gt;profil&lt;/em&gt;."
    subhero="Le minimum pour personnaliser votre espace — vous pourrez tout modifier ensuite."
    badge="N° 0005"
    eyebrow="04 · Inscription · 2/2"
    title="Complétez votre profil."
    sub="Étape 2 sur 2 — presque fini."
  >
    <form [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>
      <kp-steps [current]="2" [total]="2" [labels]="['Identifiants', 'Profil']" />

      <div class="name-grid">
        <kp-auth-field
          label="Prénom"
          [required]="true"
          type="text"
          placeholder="Marie"
          [control]="firstNameCtrl"
          fieldId="signup-firstname"
        />
        <kp-auth-field
          label="Nom"
          [required]="true"
          type="text"
          placeholder="Dupont"
          [control]="lastNameCtrl"
          fieldId="signup-lastname"
        />
      </div>

      <kp-role-picker [control]="roleCtrl" />

      <div class="avatar-field">
        <div class="avatar-field-label">
          <span>Photo de profil</span>
          <span class="opt-tag">optionnel</span>
        </div>
        <div class="avatar-section">
          <div class="avatar-preview-wrap">
            @if (avatarPreview) {
              <img class="avatar-preview" [src]="avatarPreview" alt="Avatar sélectionné" />
            } @else {
              <div class="avatar-placeholder">
                <lucide-icon [img]="Smile" [size]="20" />
              </div>
            }
          </div>
          <div class="avatar-btns">
            <button type="button" class="btn-ghost btn-half" (click)="openAvatarModal()">
              <lucide-icon [img]="Smile" [size]="14" />
              Choisir
            </button>
            <label class="btn-ghost btn-half" tabindex="0">
              <lucide-icon [img]="Upload" [size]="14" />
              Importer
              <input type="file" accept="image/*" class="file-input-hidden" (change)="onFileUpload($event)" />
            </label>
          </div>
        </div>
      </div>

      @if (serverError()) {
        <p class="server-error" role="alert" aria-live="polite">{{ serverError() }}</p>
      }

      <div class="wizard-footer">
        <button type="button" class="btn-ghost" (click)="prevStep()">← Retour</button>
        <button type="submit" class="btn-primary" style="flex:1" [disabled]="isSubmitting()">
          @if (isSubmitting()) {
            <span class="spinner"></span>
          } @else {
            S'inscrire
            <lucide-icon [img]="Check" [size]="16" />
          }
        </button>
      </div>
    </form>
  </kp-auth-layout-c>
}

<!-- Modal avatar -->
<kp-avatar-modal
  [isOpen]="showAvatarModal()"
  [initialUrl]="selectedAvatarUrl()"
  (confirmed)="onAvatarConfirmed($event)"
  (cancelled)="onAvatarCancelled()"
/>

<!-- Footer étape 1 -->
<ng-template #footerStep1>
  Déjà un compte ?&nbsp;
  <a routerLink="/auth/login" class="footer-link">Se connecter</a>
</ng-template>
